name: Sapien sync-service image

on:
  push:
    branches:
      - sapien/shape-startup
    paths:
      - .github/workflows/sapien-sync-service.yml
      - packages/electric-telemetry/**
      - packages/elixir-client/**
      - packages/sync-service/**
      - scripts/ci/test-sapien-sync-service.sh
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/ai-sapien/electric

jobs:
  test:
    name: Test Sapien sync-service changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ERL_FLAGS: "+S 4:4"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20.2"
          otp-version: "29.0.2"

      - name: Start Postgres test services
        working-directory: packages/sync-service/dev
        run: docker compose up --detach --wait postgres postgres2 pgbouncer

      - name: Run focused sync-service tests
        run: scripts/ci/test-sapien-sync-service.sh

      - name: Stop Postgres test services
        if: always()
        working-directory: packages/sync-service/dev
        run: docker compose down --volumes

  publish:
    name: Publish multi-platform image
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          echo "version=1.7.7-sapien.${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sapien-${short_sha}"
            echo "${IMAGE}:sapien-latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/sync-service
          file: packages/sync-service/Dockerfile
          build-contexts: |
            electric-telemetry=packages/electric-telemetry
          build-args: |
            ELECTRIC_VERSION=${{ steps.image.outputs.version }}
            SAPIEN_BANDIT_HTTP1_CLOSE_PATCH=true
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest published image
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summarize immutable image
        run: echo "${IMAGE}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
