name: Publish Sapien Electric package

on:
  push:
    branches:
      - sapien/shape-startup
    paths:
      - .github/workflows/sapien-package-visibility.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  public-package:
    name: Make GHCR package public
    runs-on: ubuntu-24.04
    steps:
      - name: Set package visibility
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.request(
              "PATCH /orgs/{org}/packages/{package_type}/{package_name}/visibility",
              {
                org: "ai-sapien",
                package_type: "container",
                package_name: "electric",
                visibility: "public",
              },
            );
